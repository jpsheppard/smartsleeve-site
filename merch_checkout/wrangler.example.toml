name = "smartsleeve-merch-checkout"
main = "cloudflare_worker.js"
compatibility_date = "2026-06-01"

# Replace with your production Worker route after creating it in Cloudflare.
# routes = [
#   { pattern = "merch.smartsleeve.ai/*", zone_name = "smartsleeve.ai" }
# ]

[vars]
MERCH_SITE_URL = "https://smartsleeve.ai"
MERCH_SUCCESS_PATH = "/app/#shop-success"
MERCH_CANCEL_PATH = "/app/#shop"
MERCH_SHIPPING_USD = "4.99"
MERCH_ALLOWED_ORIGINS = "https://smartsleeve.ai,https://www.smartsleeve.ai"

# Leave fulfillment disabled until Stripe test checkout and webhook storage work.
MERCH_FULFILLMENT_PROVIDER = "none"
PRINTFUL_CONFIRM_ORDERS = "false"

# Fill these after selecting the exact black shirt/tank variants in Printful.
# The Worker falls back to PRINTFUL_VARIANT_ID_SMARTSLEEVE_SS_TEE or
# PRINTFUL_VARIANT_ID_SMARTSLEEVE_SS_TANK only if size-specific ids are absent,
# but production should use one id per product/size.
# PRINTFUL_VARIANT_ID_SMARTSLEEVE_SS_TEE_S = ""
# PRINTFUL_VARIANT_ID_SMARTSLEEVE_SS_TEE_M = ""
# PRINTFUL_VARIANT_ID_SMARTSLEEVE_SS_TEE_L = ""
# PRINTFUL_VARIANT_ID_SMARTSLEEVE_SS_TEE_XL = ""
# PRINTFUL_VARIANT_ID_SMARTSLEEVE_SS_TEE_2XL = ""
# PRINTFUL_VARIANT_ID_SMARTSLEEVE_SS_TANK_S = ""
# PRINTFUL_VARIANT_ID_SMARTSLEEVE_SS_TANK_M = ""
# PRINTFUL_VARIANT_ID_SMARTSLEEVE_SS_TANK_L = ""
# PRINTFUL_VARIANT_ID_SMARTSLEEVE_SS_TANK_XL = ""
# PRINTFUL_VARIANT_ID_SMARTSLEEVE_SS_TANK_2XL = ""
# PRINTFUL_FILE_URL_SMARTSLEEVE_SS = "https://smartsleeve.ai/merch/smartsleeve-ss-front-print.png"

# Create a KV namespace and replace the id.
# [[kv_namespaces]]
# binding = "MERCH_ORDERS"
# id = ""
