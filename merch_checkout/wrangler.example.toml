name = "smartsleeve-merch-checkout"
main = "cloudflare_worker.js"
compatibility_date = "2026-06-01"

# Replace with your production Worker route after creating it in Cloudflare.
# routes = [
#   { pattern = "merch.smartsleeve.ai/*", zone_name = "smartsleeve.ai" }
# ]

[vars]
MERCH_SITE_URL = "https://smartsleeve.ai"
MERCH_SUCCESS_PATH = "/app/#shop-success"
MERCH_CANCEL_PATH = "/app/#shop"
MERCH_SHIPPING_USD = "0.00"
MERCH_INCLUDED_SHIPPING_USD = "0.00"
MERCH_ALLOWED_ORIGINS = "https://smartsleeve.ai,https://www.smartsleeve.ai"
MERCH_RECEIPT_FROM_EMAIL = "SmartSleeve Shop <shop@smartsleeve.ai>"
MERCH_RECEIPT_REPLY_TO_EMAIL = "SmartSleeve Shop <shop@smartsleeve.ai>"
MERCH_FULFILLMENT_BUSINESS_DAYS_MIN = "2"
MERCH_FULFILLMENT_BUSINESS_DAYS_MAX = "7"
MERCH_DOMESTIC_SHIPPING_BUSINESS_DAYS_MIN = "3"
MERCH_DOMESTIC_SHIPPING_BUSINESS_DAYS_MAX = "8"

# Leave fulfillment disabled until Stripe test checkout and webhook storage work.
MERCH_FULFILLMENT_PROVIDER = "none"
PRINTFUL_CONFIRM_ORDERS = "false"

# Required for customer receipt emails.
# wrangler secret put RESEND_API_KEY

# Required for Printful shipment/delivery lifecycle webhooks.
# Add this token to the Printful webhook URL as ?token=<secret>, or send it as
# x-smartsleeve-webhook-secret.
# wrangler secret put PRINTFUL_WEBHOOK_SECRET

# Prefer Printful sync variant ids from your already-published products.
# Generate these with:
#   PRINTFUL_API_KEY=... python3 scripts/sync_printful_storefront.py
# Then paste the [vars] from merch_checkout/printful-sync-variants.generated.toml here
# or set them in the Cloudflare Worker dashboard. Example:
# MERCH_PRICE_USD_SMARTSLEEVE_SS_TEE_BRAND_M = "19.99"
# PRINTFUL_SYNC_VARIANT_ID_SMARTSLEEVE_SS_TEE_BRAND_M = "123456789"
#
# The Worker still supports raw catalog variant ids + print file URLs as fallback,
# but sync variant ids are safer because they preserve the exact Printful product,
# print placement, print method, and prices you published in Printful.

# Create a KV namespace and replace the id.
# [[kv_namespaces]]
# binding = "MERCH_ORDERS"
# id = ""
