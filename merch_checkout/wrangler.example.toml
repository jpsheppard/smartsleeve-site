name = "smartsleeve-merch-checkout"
main = "cloudflare_worker.js"
compatibility_date = "2026-06-01"

# Replace with your production Worker route after creating it in Cloudflare.
# routes = [
#   { pattern = "merch.smartsleeve.ai/*", zone_name = "smartsleeve.ai" }
# ]

[vars]
MERCH_SITE_URL = "https://smartsleeve.ai"
MERCH_SUCCESS_PATH = "/app/#shop-success"
MERCH_CANCEL_PATH = "/app/#shop"
MERCH_SHIPPING_USD = "4.99"
MERCH_ALLOWED_ORIGINS = "https://smartsleeve.ai,https://www.smartsleeve.ai"

# Leave fulfillment disabled until Stripe test checkout and webhook storage work.
MERCH_FULFILLMENT_PROVIDER = "none"
PRINTFUL_CONFIRM_ORDERS = "false"

# Fill these after selecting the exact black shirt/tank variants in Printful.
# The same black tee ids are reused across SS/SQTS and regular/promo tee designs.
# The same black tank ids are reused across SS/SQTS and regular/promo tank designs.
# PRINTFUL_VARIANT_ID_BLACK_TEE_S = ""
# PRINTFUL_VARIANT_ID_BLACK_TEE_M = ""
# PRINTFUL_VARIANT_ID_BLACK_TEE_L = ""
# PRINTFUL_VARIANT_ID_BLACK_TEE_XL = ""
# PRINTFUL_VARIANT_ID_BLACK_TEE_2XL = ""
# PRINTFUL_VARIANT_ID_BLACK_TANK_S = ""
# PRINTFUL_VARIANT_ID_BLACK_TANK_M = ""
# PRINTFUL_VARIANT_ID_BLACK_TANK_L = ""
# PRINTFUL_VARIANT_ID_BLACK_TANK_XL = ""
# PRINTFUL_VARIANT_ID_BLACK_TANK_2XL = ""
# PRINTFUL_FILE_URL_SMARTSLEEVE_SS_FRONT = "https://smartsleeve.ai/merch/smartsleeve-ss-short-front-print.png"
# PRINTFUL_FILE_URL_SQTS_LLC_FRONT = "https://smartsleeve.ai/merch/sqts-llc-front-print.png"
# PRINTFUL_FILE_URL_SMARTSLEEVE_BACK = "https://smartsleeve.ai/merch/smartsleeve-back-print.png"
# PRINTFUL_FILE_URL_SMARTSLEEVE_BACK_QR = "https://smartsleeve.ai/merch/smartsleeve-back-qr-print.png"

