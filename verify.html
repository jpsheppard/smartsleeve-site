<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verify Account | SmartSleeve</title>
  <meta name="theme-color" content="#020617">
  <meta name="smartsleeve-auth-endpoint" content="https://smartsleeve-auth.jpsheppard88.workers.dev">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100dvh; display: grid; place-items: center; padding: 20px; color: #f8fafc; background: radial-gradient(circle at 50% 6%, rgba(57,255,20,.12), transparent 32%), #020617; font-family: Avenir, "Avenir Next", sans-serif; }
    main { width: min(660px, 100%); padding: clamp(24px, 5vw, 42px); border: 1px solid rgba(57,255,20,.28); border-radius: 24px; text-align: center; background: rgba(7,17,31,.96); box-shadow: 0 28px 90px rgba(0,0,0,.55); }
    img { display: block; width: min(460px, 100%); height: auto; margin: 0 auto 24px; }
    .eyebrow { margin: 0 0 8px; color: #39ff14; font-size: 12px; font-weight: 900; letter-spacing: .14em; text-transform: uppercase; }
    h1 { margin: 0 0 14px; font-family: Georgia, serif; font-size: clamp(30px, 6vw, 48px); }
    p { margin: 0 auto 20px; max-width: 520px; color: #b9cbbb; line-height: 1.55; }
    a { display: inline-block; padding: 13px 20px; border-radius: 10px; color: #04110a; background: linear-gradient(135deg, #39ff14, #b7ff5c); font-weight: 900; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <img src="/sqts-logo-green-llc.png" alt="SmartSleeve Quantitative Trading Systems, LLC">
    <p class="eyebrow">SmartSleeve Accounts</p>
    <h1 id="title">Verifying your email</h1>
    <p id="message" role="status">Please wait while we activate your website account.</p>
    <a id="continue" href="/" hidden>Continue to SmartSleeve</a>
  </main>
  <script>
    (function () {
      "use strict";
      var endpoint = document.querySelector('meta[name="smartsleeve-auth-endpoint"]').content.replace(/\/$/, "");
      var params = new URLSearchParams(window.location.search);
      var token = params.get("token") || "";
      window.history.replaceState({}, document.title, window.location.pathname);
      var title = document.getElementById("title");
      var message = document.getElementById("message");
      var link = document.getElementById("continue");
      if (!token) {
        title.textContent = "Verification link unavailable";
        message.textContent = "This verification link is missing or invalid. Please register again from SmartSleeve.";
        link.hidden = false;
        return;
      }
      fetch(endpoint + "/verify", {
        method: "POST",
        mode: "cors",
        credentials: "include",
        cache: "no-store",
        headers: {"Content-Type": "application/json", "Accept": "application/json"},
        body: JSON.stringify({token: token})
      }).then(function (response) {
        return response.json().catch(function () { return {}; }).then(function (payload) {
          if (!response.ok || !payload.ok) throw new Error(payload.error || "verification_failed");
          title.textContent = "Email verified";
          message.textContent = "Your general SmartSleeve website account is active. Continue and sign in with your username and password.";
          link.hidden = false;
        });
      }).catch(function () {
        title.textContent = "Verification link expired";
        message.textContent = "This link is invalid or has expired. Please create the account again to receive a fresh verification email.";
        link.hidden = false;
      });
    })();
  </script>
</body>
</html>
