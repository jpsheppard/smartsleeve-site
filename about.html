  <style>
    :root {
      --bg: #020617;
      --panel: #07111f;
      --green: #39ff14;
      --text: #e5fbe7;
      --muted: #9fb5a7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 18px;
      background:
        radial-gradient(circle at 50% 5%, rgba(57, 255, 20, 0.10), transparent 34%),
        radial-gradient(circle at 82% 24%, rgba(34, 211, 238, 0.08), transparent 28%),
        linear-gradient(135deg, #020617 0%, #07111f 48%, #020617 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1000px, 100%);
      margin: auto 0;
      padding: clamp(18px, 3vw, 34px);
      border: 1px solid rgba(57, 255, 20, 0.22);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.92), rgba(2, 6, 23, 0.96)),
        var(--panel);
      box-shadow:
        0 40px 120px rgba(0, 0, 0, 0.55),
        0 0 80px rgba(57, 255, 20, 0.12);
      text-align: center;
    }

    .brand {
      display: block;
      width: auto;
      max-width: min(560px, 90%);
      max-height: min(220px, calc(100dvh - 360px));
      height: auto;
      margin: 0 auto 20px;
      border-radius: 18px;
      object-fit: contain;
      filter: drop-shadow(0 0 24px rgba(57, 255, 20, 0.20));
    }

    h1 {
      margin: 0 0 12px;
      color: var(--green);
      font-size: clamp(30px, 4.8vw, 52px);
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-shadow: 0 0 22px rgba(57, 255, 20, 0.42);
    }

    p {
      margin: 0 auto;
      max-width: 780px;
      font-size: clamp(18px, 2vw, 24px);
      line-height: 1.3;
      color: var(--text);
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 22px;
    }

    nav a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid rgba(57, 255, 20, 0.34);
      border-radius: 999px;
      color: var(--text);
      background: rgba(57, 255, 20, 0.08);
      text-decoration: none;
      font-weight: 900;
    }

    nav a:first-child {
      color: #04110a;
      background: linear-gradient(135deg, #39ff14, #b7ff5c);
      box-shadow: 0 0 22px rgba(57, 255, 20, 0.28);
    }

    .site-footer {
      flex: 0 0 auto;
      width: min(1000px, 100%);
      margin: 16px auto 0;
      padding: 0 0 2px;
      color: rgba(159, 181, 167, 0.78);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.4;
      text-align: center;
    }
  </style>
</head>
