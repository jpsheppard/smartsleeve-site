  <style>
    :root {
      --bg: #020617;
      --panel: #07111f;
      --line: rgba(57, 255, 20, 0.32);
      --green: #39ff14;
      --green-soft: rgba(57, 255, 20, 0.76);
      --text: #e5fbe7;
      --muted: #9fb5a7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 18px;
      background:
        radial-gradient(circle at 50% 5%, rgba(57, 255, 20, 0.10), transparent 34%),
        radial-gradient(circle at 82% 24%, rgba(34, 211, 238, 0.08), transparent 28%),
        linear-gradient(135deg, #020617 0%, #07111f 48%, #020617 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .landing-shell {
      flex: 1 0 auto;
      display: grid;
      grid-template-columns: minmax(96px, 116px) minmax(0, 1000px);
      align-items: center;
      gap: clamp(18px, 3vw, 36px);
      width: min(1180px, 100%);
    }

    main {
      width: 100%;
      padding: clamp(14px, 2.2vw, 30px);
      border: 1px solid rgba(57, 255, 20, 0.22);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.92), rgba(2, 6, 23, 0.96)),
        var(--panel);
      box-shadow:
        0 40px 120px rgba(0, 0, 0, 0.55),
        0 0 80px rgba(57, 255, 20, 0.12);
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    .brand {
      display: block;
      width: auto;
      max-width: min(720px, 86vw);
      max-height: min(420px, calc(100dvh - 250px));
      height: auto;
      margin: 0 auto;
      filter: drop-shadow(0 0 24px rgba(57, 255, 20, 0.22));
    }

    .coming-soon {
      margin: clamp(14px, 2.8vw, 24px) 0 0;
      color: var(--green);
      font-size: clamp(30px, 5.2vw, 64px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow:
        0 0 12px rgba(57, 255, 20, 0.92),
        0 0 34px rgba(57, 255, 20, 0.45);
      font-family: "Orbitron", "Eurostile", "Bank Gothic", ui-sans-serif, system-ui, sans-serif;
    }

    .circuit-line {
      width: min(720px, 82%);
      height: 2px;
      margin: clamp(8px, 1.4vw, 14px) auto 0;
      background: linear-gradient(90deg, transparent, var(--green-soft), transparent);
      box-shadow: 0 0 18px rgba(57, 255, 20, 0.4);
    }

    .landing-side-menu {
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(57, 255, 20, 0.26);
      border-radius: 20px;
      background: rgba(2, 6, 23, 0.76);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35), 0 0 32px rgba(57, 255, 20, 0.10);
      backdrop-filter: blur(16px);
    }

    .landing-side-menu a,
    .landing-side-menu span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid rgba(57, 255, 20, 0.32);
      border-radius: 999px;
      color: var(--text);
      background: rgba(15, 23, 42, 0.72);
      text-decoration: none;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .landing-side-menu a:first-child {
      color: #04110a;
      background: linear-gradient(135deg, #39ff14, #b7ff5c);
      box-shadow: 0 0 22px rgba(57, 255, 20, 0.26);
    }

    .landing-side-menu span {
      cursor: default;
      color: var(--muted);
      border-color: rgba(159, 181, 167, 0.24);
      background: rgba(15, 23, 42, 0.48);
    }

    .site-footer {
      flex: 0 0 auto;
      width: min(1180px, 100%);
      margin: 16px auto 0;
      padding: 0 0 2px;
      color: rgba(159, 181, 167, 0.78);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.4;
      text-align: center;
    }

    @media (max-width: 860px) {
      body {
        display: flex;
        align-items: stretch;
      }

      .landing-shell {
        display: flex;
        flex-direction: column;
      }

      .landing-side-menu {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        width: min(1000px, 100%);
        margin: 0 auto 14px;
      }
    }
  </style>
</head>

  <script>
    (function () {
      var meta = document.querySelector('meta[name="sqts-analytics-endpoint"]');
      var endpoint = meta && meta.content && meta.content.indexOf("__SQTS_") !== 0 ? meta.content : "";
      if (!endpoint || !window.fetch) {
        return;
      }
      var visitorKey = "sqts_visitor_id_v1";
      var visitorId = "";
      try {
        visitorId = localStorage.getItem(visitorKey) || "";
        if (!visitorId) {
          visitorId = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + "-" + Math.random());
          localStorage.setItem(visitorKey, visitorId);
        }
      } catch (_err) {
        visitorId = "session-" + String(Date.now()) + "-" + Math.random();
      }
      fetch(endpoint, {
        method: "POST",
        mode: "cors",
        keepalive: true,
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          site: "smartsleeve.ai",
          path: window.location.pathname || "/",
          referrer: document.referrer || "",
          visitor_id: visitorId,
          timestamp: new Date().toISOString()
        })
      }).catch(function () {});
    })();
  </script>
