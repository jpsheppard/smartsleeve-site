<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmartSleeve Quantitative Trading Systems</title>
  <meta name="description" content="SmartSleeve Quantitative Trading Systems: agentic AI-powered quantitative trading across adaptive strategy sleeves. Coming soon.">
  <meta property="og:title" content="SmartSleeve Quantitative Trading Systems">
  <meta property="og:description" content="Agentic AI-powered quantitative trading across adaptive strategy sleeves. Coming soon.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://smartsleeve.ai/sqts-logo-green.png?v=20260612-soft-green">
  <style>
    :root {
      --bg: #020617;
      --panel: #07111f;
      --line: rgba(57, 255, 20, 0.32);
      --green: #39ff14;
      --green-soft: rgba(57, 255, 20, 0.76);
      --text: #e5fbe7;
      --muted: #9fb5a7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        radial-gradient(circle at 50% 5%, rgba(57, 255, 20, 0.10), transparent 34%),
        radial-gradient(circle at 82% 24%, rgba(34, 211, 238, 0.08), transparent 28%),
        linear-gradient(135deg, #020617 0%, #07111f 48%, #020617 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1000px, 100%);
      padding: clamp(18px, 3.2vw, 38px);
      border: 1px solid rgba(57, 255, 20, 0.22);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.92), rgba(2, 6, 23, 0.96)),
        var(--panel);
      box-shadow:
        0 40px 120px rgba(0, 0, 0, 0.55),
        0 0 80px rgba(57, 255, 20, 0.12);
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    main::before,
    main::after {
      content: "";
      position: absolute;
      inset: auto;
      width: 300px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line), transparent);
      transform: rotate(18deg);
      pointer-events: none;
    }

    main::before {
      left: -80px;
      top: 80px;
    }

    main::after {
      right: -70px;
      bottom: 96px;
    }

    .brand {
      display: block;
      width: min(720px, 100%);
      height: auto;
      margin: 0 auto 18px;
      border-radius: 18px;
      filter: drop-shadow(0 0 24px rgba(57, 255, 20, 0.22));
    }

    .tagline {
      margin: 0 auto;
      max-width: 760px;
      color: var(--text);
      font-size: clamp(17px, 2vw, 23px);
      line-height: 1.35;
      letter-spacing: 0.01em;
    }

    .coming-soon {
      margin: clamp(22px, 4.4vw, 42px) 0 0;
      color: var(--green);
      font-size: clamp(34px, 6vw, 72px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow:
        0 0 12px rgba(57, 255, 20, 0.92),
        0 0 34px rgba(57, 255, 20, 0.45);
      font-family: "Orbitron", "Eurostile", "Bank Gothic", ui-sans-serif, system-ui, sans-serif;
    }

    .circuit-line {
      width: min(720px, 82%);
      height: 2px;
      margin: 22px auto 0;
      background: linear-gradient(90deg, transparent, var(--green-soft), transparent);
      box-shadow: 0 0 18px rgba(57, 255, 20, 0.4);
    }
  </style>
</head>
<body>
  <main aria-label="SmartSleeve Quantitative Trading Systems coming soon">
    <img
      class="brand"
      src="/sqts-logo-green.png?v=20260612-soft-green"
      alt="SQTS - SmartSleeve Quantitative Trading Systems">
    <p class="tagline">Agentic AI-powered quantitative trading across adaptive strategy sleeves.</p>
    <div class="circuit-line" aria-hidden="true"></div>
    <h1 class="coming-soon">Coming soon...</h1>
  </main>
</body>
</html>
