<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password | SmartSleeve</title>
  <meta name="theme-color" content="#020617">
  <meta name="smartsleeve-auth-endpoint" content="https://smartsleeve-auth.jpsheppard88.workers.dev">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100dvh; display: grid; place-items: center; padding: 20px; color: #f8fafc; background: radial-gradient(circle at 50% 6%, rgba(57,255,20,.12), transparent 32%), #020617; font-family: Avenir, "Avenir Next", sans-serif; }
    main { width: min(660px, 100%); padding: clamp(24px, 5vw, 42px); border: 1px solid rgba(57,255,20,.28); border-radius: 24px; background: rgba(7,17,31,.96); box-shadow: 0 28px 90px rgba(0,0,0,.55); }
    img { display: block; width: min(460px, 100%); height: auto; margin: 0 auto 24px; }
    .eyebrow { margin: 0 0 8px; color: #39ff14; font-size: 12px; font-weight: 900; letter-spacing: .14em; text-align: center; text-transform: uppercase; }
    h1 { margin: 0 0 10px; font-family: Georgia, serif; font-size: clamp(30px, 6vw, 46px); text-align: center; }
    p { margin: 0 auto 20px; max-width: 520px; color: #b9cbbb; line-height: 1.55; text-align: center; }
    label { display: grid; gap: 7px; margin: 12px 0; color: #d8f5dd; font-size: 12px; font-weight: 900; text-transform: uppercase; }
    input { width: 100%; min-height: 44px; padding: 0 12px; border: 1px solid rgba(57,255,20,.24); border-radius: 9px; color: #f8fafc; background: #020617; font: inherit; }
    button, a { display: block; width: 100%; min-height: 44px; margin-top: 16px; padding: 12px 18px; border: 0; border-radius: 10px; color: #04110a; background: linear-gradient(135deg, #39ff14, #b7ff5c); font: inherit; font-weight: 900; text-align: center; text-decoration: none; cursor: pointer; }
  </style>
</head>
<body>
  <main>
    <img src="/sqts-logo-green-llc.png" alt="SmartSleeve Quantitative Trading Systems, LLC">
    <p class="eyebrow">SmartSleeve Accounts</p>
    <h1 id="title">Choose a new password</h1>
    <p id="message" role="status">Use at least 12 characters. Completing this reset signs the account out of older sessions.</p>
    <form id="form">
      <label>New password<input id="password" type="password" autocomplete="new-password" minlength="12" required></label>
      <label>Confirm new password<input id="password-confirm" type="password" autocomplete="new-password" minlength="12" required></label>
      <button type="submit">Reset password</button>
    </form>
    <a id="continue" href="/" hidden>Return to SmartSleeve</a>
  </main>
  <script>
    (function () {
      "use strict";
      var endpoint = document.querySelector('meta[name="smartsleeve-auth-endpoint"]').content.replace(/\/$/, "");
      var params = new URLSearchParams(window.location.search);
      var token = params.get("token") || "";
      window.history.replaceState({}, document.title, window.location.pathname);
      var form = document.getElementById("form");
      var title = document.getElementById("title");
      var message = document.getElementById("message");
      var link = document.getElementById("continue");
      if (!token) {
        title.textContent = "Reset link unavailable";
        message.textContent = "This password reset link is missing or invalid. Request a new link from the SmartSleeve sign-in window.";
        form.hidden = true;
        link.hidden = false;
        return;
      }
      form.addEventListener("submit", function (event) {
        event.preventDefault();
        var password = document.getElementById("password").value;
        var confirmation = document.getElementById("password-confirm").value;
        message.textContent = "Securing your new password...";
        fetch(endpoint + "/password-reset/confirm", {
          method: "POST",
          mode: "cors",
          credentials: "include",
          cache: "no-store",
          headers: {"Content-Type": "application/json", "Accept": "application/json"},
          body: JSON.stringify({token: token, password: password, password_confirm: confirmation})
        }).then(function (response) {
          return response.json().catch(function () { return {}; }).then(function (payload) {
            if (!response.ok || !payload.ok) throw new Error(payload.error || "password_reset_failed");
            title.textContent = "Password updated";
            message.textContent = "Your password is reset. Return to SmartSleeve and sign in with your username and new password.";
            form.hidden = true;
            link.hidden = false;
          });
        }).catch(function (error) {
          var messages = {
            password_must_be_at_least_12_characters: "Use a password with at least 12 characters.",
            password_confirmation_mismatch: "The password confirmation does not match.",
            password_reset_link_expired_or_invalid: "This reset link is invalid or expired. Request a new one from the sign-in window."
          };
          message.textContent = messages[error.message] || "The password could not be reset. Please request a new link.";
        });
      });
    })();
  </script>
</body>
</html>
