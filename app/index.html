<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>SmartSleeve Private Access</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at 50% 12%, rgba(57,255,20,.12), transparent 34%), #020617;
      color: #e5fbe7;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(680px, 100%);
      padding: clamp(24px, 6vw, 48px);
      border: 1px solid rgba(57,255,20,.24);
      border-radius: 22px;
      background: rgba(2,6,23,.86);
      text-align: center;
      box-shadow: 0 32px 100px rgba(0,0,0,.52), 0 0 56px rgba(57,255,20,.10);
    }
    img { width: min(420px, 90%); height: auto; margin-bottom: 18px; }
    h1 { margin: 0 0 10px; color: #39ff14; font-size: clamp(30px, 6vw, 54px); letter-spacing: 0; }
    p { margin: 0 auto; max-width: 520px; color: #b9cbbb; line-height: 1.55; font-size: 16px; }
    a { display: inline-flex; margin-top: 24px; color: #061108; background: #39ff14; text-decoration: none; font-weight: 900; padding: 12px 18px; border-radius: 999px; }
  </style>
</head>
<body>
  <main aria-label="SmartSleeve private access locked">
    <img src="/brand/smartsleeve-apparel-logo-cropped.png" alt="SmartSleeve">
    <h1>Private Access Locked</h1>
    <p>SmartSleeve account dashboards are not served from the public website. Sign-in will return after the private application gateway is enabled.</p>
    <a href="/">Back to SmartSleeve</a>
  </main>
</body>
</html>
